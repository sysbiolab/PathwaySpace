url: https://github.com/sysbiolab/PathwaySpace

destination: docs

template:
  bootstrap: 5
  bootswatch: flatly
  params:
    mathjax: true
  includes:
    in_header: |
      <style>
        .contents h1, .page-header h1 {
          font-size: 2.2rem !important;
          font-weight: 700 !important;
          margin-bottom: 1rem !important;
        }
        .contents h2 {
          font-size: 1.6rem !important;
          margin-top: 2rem !important;
        }
      </style>

navbar:
  title: "PathwaySpace"
  left:
    - text: "Install"
      href: articles/install.html
    - text: "Get Started"
      href: articles/get-started.html
    - text: "Vignettes"
      menu:
      - text: Introductory Vignettes
        header: true
      - text: "PathwaySpace projection methods"
        href: articles/projection-methods.html
      - text: "Modeling signal decay functions"
        href: articles/modeling-signal-decay.html
      - text: "Creating signal aggregation rules"
        href: articles/signal-aggregation-rules.html
      - text: -------
      - text: Visualizing features
        header: true
      - text: "Sparse feature sets"
        href: articles/sparse-feature-sets.html
      - text: "Spatial transcriptomics"
        href: articles/spatial-transcriptomics.html

home:
  sidebar:
    structure: [links, license, community, citation, dev]
    components:
      dev:
        title: Developers
        text: |
          <ul class="list-unstyled">
            <li>Sysbiolab Team</li>
            <li><a href="authors.html">More about authors...</a></li>
          </ul>

footer:
  structure:
    left:  developed_by
    right: built_with
  components:
    developed_by: "Developed by Sysbiolab"

